name: Promote to Custom Domain

on:
  workflow_dispatch: {}

env:
  VERCEL_PROJECT_ID: prj_YF92R4H7foXEMsy7aWDEsl0TYQop
  VERCEL_TEAM_ID: team_UfbR878tcAcAeYeaLtJcUlSA

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Ensure domains have no gitBranch binding (avoid orphaning)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          for domain in somosedificadigital.com www.somosedificadigital.com; do
            resp=$(curl -sS -X PATCH \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/domains/${domain}?teamId=${VERCEL_TEAM_ID}" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"gitBranch":null}' \
              -w '\nHTTP_STATUS:%{http_code}\n')
            echo "$resp"
            status=$(echo "$resp" | grep HTTP_STATUS | cut -d: -f2)
            if [ "$status" != "200" ]; then
              echo "::error::gitBranch clear failed for $domain (status $status)"
              exit 1
            fi
          done

      - name: Alias custom domain to current production deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel alias set edificadigital.vercel.app somosedificadigital.com \
            --token="$VERCEL_TOKEN" \
            --scope=yangetzes-projects
          vercel alias set edificadigital.vercel.app www.somosedificadigital.com \
            --token="$VERCEL_TOKEN" \
            --scope=yangetzes-projects
